name = "Simi"
grammar = "simi"
path_suffixes = ["simi"]
line_comments = ["-- "]
tab_size = 4
hard_tabs = false
autoclose_before = ";:.,=}])>"
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string", "comment"] },
]

# These patterns complement indents.scm while a construct is incomplete.
# Branch markers realign before their `do` body; complete one-line forms do not match.
increase_indent_pattern = "^(?:.*\\b(do|then|else|try)\\s*|\\s*case\\b(?:[^\\s-]|-[^>]|\\s+[^o\\s-]|\\s+o[^f]|\\s+of\\w|\\s+-[^>])*)\\s*(--.*)?$"
decrease_indent_pattern = "^\\s*(elseif|else|of|catch|end)\\b"
