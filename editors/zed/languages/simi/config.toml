name = "Simi"
grammar = "simi"
path_suffixes = ["simi"]
line_comments = ["-- "]
tab_size = 4
hard_tabs = false
autoclose_before = ";:.,=}])>"
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string", "comment"] },
]

# These patterns complement indents.scm while a construct is incomplete.
# A clause header ends in `do`; a complete one-line `pattern do body end` does not match.
increase_indent_pattern = "^.*\\b(do|then|of|catch|else|try)\\s*(--.*)?$"
decrease_indent_pattern = "^\\s*(elseif|else|catch|end)\\b"
